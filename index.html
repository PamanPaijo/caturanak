<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Catur Seru — Belajar Catur 3D</title>
  <meta name="description" content="Aplikasi 3D mengenal dan belajar catur untuk anak. Offline & PWA." />
  <meta name="theme-color" content="#BFE3FF" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/style.css" />
  <script type="importmap">
  {
    "imports": { "three": "./js/three.module.min.js" }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <button id="btn-mute" aria-label="Suara nyala">🔊</button>

  <div id="hud-top">
    <h1 id="title">Catur Seru</h1>
    <p id="subtitle">Sentuh bidaknya!</p>
  </div>

  <button id="btn-next" class="float-btn hidden">Ganti bidak ↻</button>
  <button id="btn-reset" class="float-btn hidden">Mulai lagi ↻</button>

  <nav id="hud-bottom">
    <button class="mode-btn active" data-mode="meet"><span class="ico">👀</span>Kenali Bidak</button>
    <button class="mode-btn" data-mode="moves"><span class="ico">👣</span>Cara Jalan</button>
    <button class="mode-btn" data-mode="play"><span class="ico">♟️</span>Main</button>
  </nav>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
